<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资源管理后台</title>
<link rel="stylesheet" href="admin.css">
</head>
<body onload="checkAuth().then(()=>getList())">
<div class="layout">
  <div class="sidebar">
    <h3>管理菜单</h3>
    <a href="dashboard.html">📁 全部资源</a>
    <a href="publish.html">➕ 发布新资源</a>
    <a href="javascript:logout()">🚪 退出登录</a>
  </div>
  <div class="main">
    <div class="card">
      <h3>全部资源列表</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>标题</th>
            <th>分类</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="admin.js"></script>
</body>
</html>
